apiVersion: "serving.kserve.io/v1beta1"
kind: "InferenceService"
metadata:
  name: wine-quality
  namespace: kserve-inference
  annotations:
    prometheus.io/scrape: "true"
spec:
  predictor:
    serviceAccountName: kserve-sa # created when deploying the MLOps platform, associating with the secret that contains the username and password of the MLflow's MinIO server
    model:
      modelFormat:
        name: sklearn
      storageUri: s3://mlflow/12/561a6e73d58c47d2a35c11b3e075af2d/artifacts/model # change to the S3 URI of your model artifact
